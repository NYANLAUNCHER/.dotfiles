
# Fonts: "https://sw.kovidgoyal.net/kitty/conf/"
font_family JetBrainsMono NF
font_size 12.0


# Cursor: "https://sw.kovidgoyal.net/kitty/conf/#cursor-customization"
cursor_shape block


# Mouse: "https://sw.kovidgoyal.net/kitty/conf/#mouse"
url_style straight


# Tab Bar: "https://sw.kovidgoyal.net/kitty/conf/#tab-bar"
tab_bar_style powerline


# Color Scheme: "https://sw.kovidgoyal.net/kitty/conf/#color-scheme"
include colors/gruvbox-dark.conf


# Keybinds: "https://sw.kovidgoyal.net/kitty/conf/#keyboard-shortcuts"

## Tab Management: "https://sw.kovidgoyal.net/kitty/conf/#tab-management"
map ctrl+shift+t new_tab_with_cwd
